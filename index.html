<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Taboo - Setup</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container setup-screen">
        <img src="./taboo.png" alt="medical taboo" class="centered-img">
        <div class="team-input">
            <label for="team-a-name">Team A Name:</label>
            <input type="text" id="team-a-name" placeholder="Enter Team A Name">
        </div>
        <div class="team-input">
            <label for="team-b-name">Team B Name:</label>
            <input type="text" id="team-b-name" placeholder="Enter Team B Name">
        </div>
        <button id="next-button">next</button>
    </div>
    <div class="deck-select">
    <label for="deck">Choose a Deck:</label>

    <select id="deck">
        <option value="cards-medical">Learning Communities</option>
        <option value="cards-pediatrics">Medical Diagnosis & Treatment</option>
        <option value="cards-anatomy">Summer Education Institute</option>
    </select>
</div>

    <script src="js/setup.js"></script>
</body>
</html>
